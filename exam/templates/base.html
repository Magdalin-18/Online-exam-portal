{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>TEST YOUR KNOWLEDGE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #343a40; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark px-4 py-3">
    <span class="navbar-brand fw-bold fs-4">📝 Exam Portal</span>
    <div>
        {% if user.is_authenticated %}
            <span class="text-white me-3">👤 {{ user.username }}</span>
            {% if user.is_staff %}
                <a href="{% url 'students_list' %}" class="btn btn-warning btn-sm me-2">👥 Users</a>
            {% endif %}
            <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">Logout</a>
        {% else %}
            <a href="{% url 'login' %}" class="btn btn-primary btn-sm me-2">Login</a>
            <a href="{% url 'register' %}" class="btn btn-success btn-sm">Register</a>
        {% endif %}
    </div>
</nav>
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
